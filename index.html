<!-- v8 - Lalo edition: custom trophy, starfield, shimmer header -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lalo's World Cup 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#0a0e1a;--card:#111827;--border:#1f2d45;
  --gold:#f5c842;--green:#22c55e;--red:#ef4444;
  --text:#e2e8f0;--muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

/* в”Ђв”Ђ STICKY TOP STACK в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
#stickyTop{position:sticky;top:0;z-index:100;background:var(--bg);max-width:600px;margin:0 auto;}
body{display:flex;flex-direction:column;align-items:center;}
#stickyTop,.content{width:100%;max-width:600px;}

/* в”Ђв”Ђ LALO HEADER (compact, single row) в”Ђв”Ђв”Ђв”Ђв”Ђ */
header{
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,#050d1f 0%,#0a1628 50%,#071020 100%);
  border-bottom:2px solid var(--gold);
  padding:7px 14px;
}
header::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 30%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 20%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 80%, rgba(255,255,255,.3) 0%, transparent 100%);
  pointer-events:none;
}
header::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(245,200,66,.05) 50%,transparent 70%);
  animation:sweep 5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes sweep{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}

.header-inner{
  display:flex;align-items:center;justify-content:center;gap:9px;
  position:relative;z-index:1;
}
.trophy-wrap{
  flex-shrink:0;
  filter:drop-shadow(0 0 6px rgba(245,200,66,.5));
  animation:trophyFloat 3s ease-in-out infinite;
}
.trophy-wrap svg{display:block;width:30px;height:38px;}
@keyframes trophyFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

.brand-block{text-align:left;display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;}

.lalo-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:23px;letter-spacing:2px;line-height:1;
  background:linear-gradient(135deg,#ffe066 0%,#f5c842 40%,#fff8dc 60%,#f5c842 80%,#c8960a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.lalo-sub{
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;letter-spacing:3px;color:#fff;opacity:.8;line-height:1;
}
.lalo-year{
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;letter-spacing:2px;color:var(--gold);opacity:.65;
}

.header-badges{
  position:relative;z-index:1;
  display:flex;justify-content:center;gap:5px;flex-wrap:wrap;
  margin-top:4px;
}
.badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.5px;padding:1px 7px;border-radius:20px;text-transform:uppercase;}
.badge-gold{background:var(--gold);color:#000;}
.badge-green{background:rgba(34,197,94,.2);color:var(--green);border:1px solid var(--green);}

/* update bar */
#updateBar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:5px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;
}
#updateStatus{font-size:11px;color:var(--muted);flex:1;}
#updateStatus b{color:var(--text);}
#refreshBtn{
  background:var(--gold);color:#000;border:none;
  font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;
  cursor:pointer;white-space:nowrap;
}
#refreshBtn:disabled{opacity:.5;cursor:not-allowed;}

/* tabs + filters */
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--card);scrollbar-width:none;padding:0 12px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 14px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.group-filters{display:flex;overflow-x:auto;gap:6px;padding:6px 14px;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border);}
.group-filters::-webkit-scrollbar{display:none;}
.gf-btn{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;}
.gf-btn.active{background:var(--gold);border-color:var(--gold);color:#000;}

/* content */
.content{padding:10px 12px 100px;}

/* day blocks */
.day-block{margin-bottom:18px;}
.day-label{
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;
  color:var(--gold);padding:8px 0 5px;border-bottom:1px solid var(--border);
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.day-label.today-label{color:#fff;}
.day-label.today-label .day-num{background:var(--red);animation:todaypulse 2s infinite;}
@keyframes todaypulse{0%,100%{opacity:1}50%{opacity:.7}}
.day-num{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:'Inter',sans-serif;}

/* match cards */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 12px;margin-bottom:7px;transition:border-color .2s;}
.match-card.done{border-color:rgba(34,197,94,.35);}
.match-card.live{border-color:rgba(239,68,68,.5);background:#130a0a;}
.match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.match-group{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.match-time{font-size:13px;font-weight:700;color:var(--gold);}
.match-teams{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.team{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.team-flag{font-size:26px;line-height:1;}
.team-name{font-size:11px;font-weight:600;text-align:center;color:var(--text);line-height:1.2;}
.vs-block{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:44px;}
.vs{font-size:12px;font-weight:700;color:var(--muted);}
.score{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text);letter-spacing:2px;}
.score.live{color:var(--red);}
.match-footer{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border);}
.match-venue{font-size:10px;color:var(--muted);flex:1;}
.finished{font-size:9px;font-weight:700;color:var(--green);letter-spacing:1px;}
.live-badge{font-size:9px;font-weight:700;color:var(--red);background:rgba(239,68,68,.15);padding:2px 6px;border-radius:10px;letter-spacing:1px;animation:pulse 1.5s infinite;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px;}

.hidden{display:none;}

/* bottom totals bar */
.totals{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-top:1px solid var(--border);
  padding:8px 16px;display:flex;justify-content:space-around;z-index:50;
}
.total-item{text-align:center;}
.total-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);}
.total-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* groups tab вЂ” standings table */
.group-info-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:4px;}
@media(min-width:640px){.group-info-grid{grid-template-columns:1fr 1fr;}}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px;}
.group-card-title{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.group-card-title .gc-complete{font-size:8px;color:var(--green);letter-spacing:0;font-family:'Inter',sans-serif;font-weight:700;}

.standings-table{width:100%;border-collapse:collapse;font-size:10px;}
.standings-table th{
  font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase;
  padding:2px 1px;text-align:center;letter-spacing:.3px;
}
.standings-table th.th-team{text-align:left;padding-left:2px;}
.standings-table td{padding:4px 1px;text-align:center;color:var(--text);}
.standings-table td.td-team{
  text-align:left;padding-left:2px;font-weight:600;font-size:10px;
  display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.standings-table tr{border-bottom:1px solid rgba(255,255,255,.04);}
.standings-table tr:last-child{border-bottom:none;}
.standings-table tr.qualifying td.td-pos{color:var(--green);font-weight:800;}
.standings-table tr.qualifying{background:rgba(34,197,94,.06);}
.td-pos{font-weight:700;color:var(--muted);width:14px;}
.td-pts{font-weight:800;color:var(--gold);}
.team-flag-sm{font-size:13px;}

/* в”Ђв”Ђ FLOATING ACTION BUTTONS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.fab-stack{
  position:fixed;right:14px;bottom:70px;
  display:flex;flex-direction:column;gap:8px;z-index:80;
}
.fab{
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;box-shadow:0 4px 12px rgba(0,0,0,.4);
  transition:transform .15s,opacity .15s;
}
.fab:active{transform:scale(.9);}
.fab-hoy{background:var(--gold);color:#000;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;}
.fab-top{background:var(--card);color:var(--muted);border:1px solid var(--border);font-size:18px;}
.fab-top.visible{color:var(--gold);}
</style>
</head>

// Today label detection (Chihuahua UTC-6)
const todayDayLabels = (() => {
  const now = new Date();
  const chih = new Date(now.getTime() - 6*60*60*1000);
  const days = ['Dom','Lun','Mar','MiГ©','Jue','Vie','SГЎb'];
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${days[chih.getUTCDay()]} ${chih.getUTCDate()} ${months[chih.getUTCMonth()]}`;
})();

let liveData = {}, activeGroup = 'all', lastUpdated = null;

// в”Ђв”Ђ API в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function fetchScores() {
  const btn = document.getElementById('refreshBtn');
  const statusEl = document.getElementById('updateStatus');
  btn.disabled = true;
  statusEl.innerHTML = '<span class="spinner"></span> Actualizando...';
  try {
    const res = await fetch('https://holy-queen-11f5.eduardolozano0.workers.dev/?t=' + Date.now(), {cache:'no-store'});
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.message||`HTTP ${res.status}`); }
    const data = await res.json();
    liveData = {};
    const tlaAlias = {'URY':'URU','URU':'URY','SAU':'KSA','KSA':'SAU'};
    (data.matches||[]).forEach(am => {
      const hN=am.homeTeam?.name||'', aN=am.awayTeam?.name||'';
      const hT=am.homeTeam?.tla||'', aT=am.awayTeam?.tla||'';
      const hK=[hT,tlaAlias[hT]].filter(Boolean), aK=[aT,tlaAlias[aT]].filter(Boolean);
      let loc=matches.find(m=>(hK.includes(m.hkey)&&aK.includes(m.akey))||(hK.includes(m.akey)&&aK.includes(m.hkey)));
      if (!loc) {
        const hF=hN.toLowerCase().split(' ')[0], aF=aN.toLowerCase().split(' ')[0];
        loc=matches.find(m=>(m.hname.toLowerCase().includes(hF)&&m.aname.toLowerCase().includes(aF))||(m.aname.toLowerCase().includes(hF)&&m.hname.toLowerCase().includes(aF)));
      }
      if (!loc) return;
      const st=am.status, hg=am.score?.fullTime?.home, ag=am.score?.fullTime?.away;
      let score=null, statusKey='NS';
      if (st==='FINISHED'){score=`${hg??0}-${ag??0}`;statusKey='FT';}
      else if (st==='IN_PLAY'||st==='PAUSED'){score=`${am.score?.halfTime?.home??0}-${am.score?.halfTime?.away??0}`;statusKey='LIVE';}
      liveData[loc.id]={score,status:statusKey};
    });
    lastUpdated=new Date();
    renderCalendar(activeGroup);
    renderGroups();
    updateBar(true,null);
  } catch(e) { console.error(e); updateBar(false,e.message); }
  finally { btn.disabled=false; }
}

function updateBar(ok, err) {
  const el=document.getElementById('updateStatus');
  const fin=matches.filter(m=>liveData[m.id]?.status==='FT').length;
  const live=matches.filter(m=>liveData[m.id]?.status==='LIVE').length;
  document.getElementById('finishedCount').textContent=fin;
  document.getElementById('liveCount').textContent=live;
  if (ok) {
    const t=lastUpdated.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    el.innerHTML=`вњ… <b>${t}</b> В· ${fin} terminados${live?` В· <span style="color:var(--red)">в—Џ${live} en vivo</span>`:''}`;
  } else { el.innerHTML=`вљ пёЏ ${err||'Error'} вЂ” intenta de nuevo`; }
}

// в”Ђв”Ђ RENDER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderCalendar(groupFilter) {
  const cal=document.getElementById('calendarTab');
  const list=groupFilter==='all'?matches:matches.filter(m=>m.group===groupFilter);
  const byDay={};
  list.forEach(m=>{if(!byDay[m.date])byDay[m.date]=[];byDay[m.date].push(m);});
  let html='';
  Object.entries(byDay).forEach(([day,ms])=>{
    const isToday = day === todayDayLabels;
    const dayId = isToday ? 'id="today-anchor"' : '';
    html+=`<div class="day-block" ${dayId}>
      <div class="day-label${isToday?' today-label':''}">
        <span class="day-num">${isToday?'HOY':ms.length+' partido'+(ms.length>1?'s':'')}</span>${day}
        ${isToday?`<span style="font-size:10px;color:var(--red);margin-left:auto">в—Џ ${ms.length} partidos</span>`:''}
      </div>`;
    ms.forEach(m=>{
      const d=liveData[m.id], st=d?.status||'NS', sc=d?.score||null;
      const isFT=st==='FT', isLive=st==='LIVE';
      const badge=isFT?`<span class="finished">вњ“ Final</span>`:isLive?`<span class="live-badge">в—Џ EN VIVO</span>`:'';
      const mid=(isFT||isLive)&&sc?`<span class="score${isLive?' live':''}">${sc}</span>`:`<span class="vs">VS</span>`;
      html+=`<div class="match-card${isFT?' done':isLive?' live':''}">
        <div class="match-top">
          <span class="match-group">Grupo ${m.group} В· ${m.j}</span>
          <div style="display:flex;align-items:center;gap:6px">${badge}<span class="match-time">${m.time}</span></div>
        </div>
        <div class="match-teams">
          <div class="team"><div class="team-flag">${m.home}</div><div class="team-name">${m.hname}</div></div>
          <div class="vs-block">${mid}</div>
          <div class="team"><div class="team-flag">${m.away}</div><div class="team-name">${m.aname}</div></div>
        </div>
        <div class="match-footer"><span>рџ“Ќ</span><span class="match-venue">${m.venue}</span></div>
      </div>`;
    });
    html+='</div>';
  });
  cal.innerHTML=html;
}

// Build a flag+name lookup from the matches array (hname/aname + flag emoji)
const teamFlagByName = {};
matches.forEach(m=>{
  teamFlagByName[m.hname]=m.home;
  teamFlagByName[m.aname]=m.away;
});

function computeStandings(group) {
  // Initialize table for each team in the group
  const teamNames = groupTeams[group].map(t=>t.split(' ').slice(1).join(' '));
  const table = {};
  teamNames.forEach(name=>{
    table[name]={name,flag:teamFlagByName[name]||'',pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};
  });

  // Walk every match in this group that has a FINISHED result
  matches.filter(m=>m.group===group).forEach(m=>{
    const d=liveData[m.id];
    if (!d || d.status!=='FT' || !d.score) return;
    const [hg,ag]=d.score.split('-').map(Number);
    const h=table[m.hname], a=table[m.aname];
    if (!h||!a) return;
    h.pj++; a.pj++;
    h.gf+=hg; h.gc+=ag;
    a.gf+=ag; a.gc+=hg;
    if (hg>ag){h.g++;h.pts+=3;a.p++;}
    else if (hg<ag){a.g++;a.pts+=3;h.p++;}
    else {h.e++;a.e++;h.pts++;a.pts++;}
  });

  return Object.values(table).sort((x,y)=>
    y.pts-x.pts || (y.gf-y.gc)-(x.gf-x.gc) || y.gf-x.gf || x.name.localeCompare(y.name)
  );
}

function renderGroups() {
  document.getElementById('groupsGrid').innerHTML =
    Object.keys(groupTeams).map(g=>{
      const standings = computeStandings(g);
      const allPlayed = standings.every(t=>t.pj>=3);
      const rows = standings.map((t,i)=>{
        const dg = t.gf-t.gc;
        return `<tr class="${i<2?'qualifying':''}">
          <td class="td-pos">${i+1}</td>
          <td class="td-team"><span class="team-flag-sm">${t.flag}</span>${t.name}</td>
          <td>${t.pj}</td><td>${t.g}</td><td>${t.e}</td><td>${t.p}</td>
          <td>${t.gf}</td><td>${t.gc}</td><td>${dg>0?'+':''}${dg}</td>
          <td class="td-pts">${t.pts}</td>
        </tr>`;
      }).join('');
      return `<div class="group-card">
        <div class="group-card-title">GRUPO ${g}${allPlayed?'<span class="gc-complete">вњ“ COMPLETO</span>':''}</div>
        <table class="standings-table">
          <thead><tr>
            <th></th><th class="th-team">Equipo</th>
            <th>PJ</th><th>G</th><th>E</th><th>P</th>
            <th>GF</th><th>GC</th><th>DG</th><th>Pts</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('');
}

function filterGroup(group,btn) {
  activeGroup=group;
  document.querySelectorAll('.gf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCalendar(group);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.add('hidden'));
  if (tab==='calendar') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('calendarTab').classList.remove('hidden');
    document.getElementById('groupFilters').style.display='flex';
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('groupsTab').classList.remove('hidden');
    document.getElementById('groupFilters').style.display='none';
  }
}

function goToday() {
  // Switch to calendar tab first
  switchTab('calendar');
  filterGroup('all', document.querySelector('.gf-btn'));
  setTimeout(()=>{
    const el=document.getElementById('today-anchor');
    if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
  }, 100);
}

// Show/hide scroll-to-top button
window.addEventListener('scroll',()=>{
  const fab=document.getElementById('fabTop');
  if (window.scrollY>200) fab.classList.add('visible');
  else fab.classList.remove('visible');
},{passive:true});

// Days left
document.getElementById('daysLeft').textContent=Math.max(0,Math.ceil((new Date('2026-06-27')-new Date())/864e5));

renderCalendar('all');
renderGroups();
fetchScores();
setInterval(fetchScores, 60000);
</script>
