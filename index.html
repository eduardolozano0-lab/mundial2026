<!-- v8 - Lalo edition: custom trophy, starfield, shimmer header -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lalo's World Cup 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#0a0e1a;--card:#111827;--border:#1f2d45;
  --gold:#f5c842;--green:#22c55e;--red:#ef4444;
  --text:#e2e8f0;--muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

/* ── STICKY TOP STACK ────────────────────── */
#stickyTop{position:sticky;top:0;z-index:100;background:var(--bg);max-width:600px;margin:0 auto;}
body{display:flex;flex-direction:column;align-items:center;}
#stickyTop,.content{width:100%;max-width:600px;}

/* ── LALO HEADER (compact, single row) ───── */
header{
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,#050d1f 0%,#0a1628 50%,#071020 100%);
  border-bottom:2px solid var(--gold);
  padding:7px 14px;
}
header::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 30%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 20%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 80%, rgba(255,255,255,.3) 0%, transparent 100%);
  pointer-events:none;
}
header::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(245,200,66,.05) 50%,transparent 70%);
  animation:sweep 5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes sweep{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}

.header-inner{
  display:flex;align-items:center;justify-content:center;gap:9px;
  position:relative;z-index:1;
}
.trophy-wrap{
  flex-shrink:0;
  filter:drop-shadow(0 0 6px rgba(245,200,66,.5));
  animation:trophyFloat 3s ease-in-out infinite;
}
.trophy-wrap svg{display:block;width:30px;height:38px;}
@keyframes trophyFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

.brand-block{text-align:left;display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;}

.lalo-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:23px;letter-spacing:2px;line-height:1;
  background:linear-gradient(135deg,#ffe066 0%,#f5c842 40%,#fff8dc 60%,#f5c842 80%,#c8960a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.lalo-sub{
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;letter-spacing:3px;color:#fff;opacity:.8;line-height:1;
}
.lalo-year{
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;letter-spacing:2px;color:var(--gold);opacity:.65;
}

.header-badges{
  position:relative;z-index:1;
  display:flex;justify-content:center;gap:5px;flex-wrap:wrap;
  margin-top:4px;
}
.badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.5px;padding:1px 7px;border-radius:20px;text-transform:uppercase;}
.badge-gold{background:var(--gold);color:#000;}
.badge-green{background:rgba(34,197,94,.2);color:var(--green);border:1px solid var(--green);}

/* update bar */
#updateBar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:5px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;
}
#updateStatus{font-size:11px;color:var(--muted);flex:1;}
#updateStatus b{color:var(--text);}
#refreshBtn{
  background:var(--gold);color:#000;border:none;
  font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;
  cursor:pointer;white-space:nowrap;
}
#refreshBtn:disabled{opacity:.5;cursor:not-allowed;}

/* tabs + filters */
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--card);scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:0;padding:9px 6px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;text-align:center;overflow:hidden;text-overflow:ellipsis;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.group-filters{display:flex;overflow-x:auto;gap:6px;padding:6px 14px;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border);}
.group-filters::-webkit-scrollbar{display:none;}
.gf-btn{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;}
.gf-btn.active{background:var(--gold);border-color:var(--gold);color:#000;}

/* content */
.content{padding:10px 12px 100px;}

/* day blocks */
.day-block{margin-bottom:18px;}
.day-label{
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;
  color:var(--gold);padding:8px 0 5px;border-bottom:1px solid var(--border);
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.day-label.today-label{color:#fff;}
.day-label.today-label .day-num{background:var(--red);animation:todaypulse 2s infinite;}
@keyframes todaypulse{0%,100%{opacity:1}50%{opacity:.7}}
.day-num{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:'Inter',sans-serif;}

/* match cards */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 12px;margin-bottom:7px;transition:border-color .2s;}
.match-card.done{border-color:rgba(34,197,94,.35);}
.match-card.live{border-color:rgba(239,68,68,.5);background:#130a0a;}
.match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.match-group{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.match-time{font-size:13px;font-weight:700;color:var(--gold);}
.match-teams{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.team{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.team-flag{font-size:26px;line-height:1;}
.team-name{font-size:11px;font-weight:600;text-align:center;color:var(--text);line-height:1.2;}
.vs-block{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:44px;}
.vs{font-size:12px;font-weight:700;color:var(--muted);}
.score{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text);letter-spacing:2px;}
.score.live{color:var(--red);}
.match-footer{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border);}
.match-venue{font-size:10px;color:var(--muted);flex:1;}
.finished{font-size:9px;font-weight:700;color:var(--green);letter-spacing:1px;}
.live-badge{font-size:9px;font-weight:700;color:var(--red);background:rgba(239,68,68,.15);padding:2px 6px;border-radius:10px;letter-spacing:1px;animation:pulse 1.5s infinite;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px;}

.hidden{display:none;}

/* bottom totals bar */
.totals{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-top:1px solid var(--border);
  padding:8px 16px;display:flex;justify-content:space-around;z-index:50;
}
.total-item{text-align:center;}
.total-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);}
.total-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* groups tab — standings table */
.group-info-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:4px;}
@media(min-width:640px){.group-info-grid{grid-template-columns:1fr 1fr;}}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px;}
.group-card-title{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.group-card-title .gc-complete{font-size:8px;color:var(--green);letter-spacing:0;font-family:'Inter',sans-serif;font-weight:700;}

.standings-table{width:100%;border-collapse:collapse;font-size:10px;}
.standings-table th{
  font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase;
  padding:2px 1px;text-align:center;letter-spacing:.3px;
}
.standings-table th.th-team{text-align:left;padding-left:2px;}
.standings-table td{padding:4px 1px;text-align:center;color:var(--text);}
.standings-table td.td-team{
  text-align:left;padding-left:2px;font-weight:600;font-size:10px;
  display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.standings-table tr{border-bottom:1px solid rgba(255,255,255,.04);}
.standings-table tr:last-child{border-bottom:none;}
.standings-table tr.qualifying td.td-pos{color:var(--green);font-weight:800;}
.standings-table tr.qualifying{background:rgba(34,197,94,.06);}
.td-pos{font-weight:700;color:var(--muted);width:14px;}
.td-pts{font-weight:800;color:var(--gold);}
.team-flag-sm{font-size:13px;}


/* ── BRACKET / LLAVE ─────────────────────────────────────────────────── */
.bracket-wrap{overflow-x:auto;padding:10px 0 16px;scrollbar-width:none;}
.bracket-wrap::-webkit-scrollbar{display:none;}
.bracket-row{display:flex;align-items:stretch;min-width:fit-content;padding:0 12px;}
.b-round{display:flex;flex-direction:column;justify-content:space-around;width:148px;flex-shrink:0;padding:0 4px;}
.b-round-hdr{font-size:9px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;text-align:center;padding:4px 0 8px;border-bottom:1px solid var(--border);margin-bottom:6px;white-space:nowrap;}
.b-match{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 8px;margin:3px 0;}
.b-match.done{border-color:rgba(245,200,66,.4);}
.b-match.live{border-color:var(--red);}
.b-match.final-match{border-color:var(--gold);background:rgba(245,200,66,.05);}
.b-date{font-size:8px;color:var(--muted);margin-bottom:3px;white-space:nowrap;}
.b-team{display:flex;align-items:center;gap:4px;padding:1.5px 0;}
.b-flag{font-size:13px;line-height:1;width:16px;text-align:center;}
.b-name{flex:1;font-size:10px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.b-score{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--gold);min-width:18px;text-align:right;}
.b-team.tbd .b-name{color:var(--muted);font-style:italic;}
.b-team.winner .b-name,.b-team.winner .b-score{color:var(--gold);font-weight:700;}
.b-live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red);margin-right:3px;animation:pulse 1.2s infinite;vertical-align:middle;}
.b-conn{width:18px;flex-shrink:0;display:flex;flex-direction:column;justify-content:space-around;}
.b-conn-pair{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
.b-conn-pair::before{content:'';position:absolute;right:0;top:20%;bottom:20%;border-right:1px solid rgba(99,102,241,.3);}
.b-conn-pair::after{content:'';position:absolute;right:0;top:50%;width:100%;height:1px;background:rgba(99,102,241,.3);}
.b-placeholder{text-align:center;color:var(--muted);padding:40px 20px;font-size:12px;line-height:2;}
.tbd-name{color:var(--muted);}

/* Champion banner */
.champion-banner{
  background:linear-gradient(135deg,rgba(245,200,66,.15),rgba(245,200,66,.05));
  border:1px solid var(--gold);border-radius:12px;
  padding:16px;text-align:center;margin:4px 12px 12px;
}
.champ-trophy{font-size:40px;line-height:1;animation:trophyFloat 3s ease-in-out infinite;}
.champ-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--gold);margin-top:6px;}
.champ-team{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:#fff;margin-top:2px;}

/* KO progress bar */
.ko-progress{
  display:flex;gap:12px;justify-content:center;align-items:center;
  padding:8px;margin:0 12px 8px;background:var(--card);
  border:1px solid var(--border);border-radius:8px;
  font-size:11px;font-weight:600;color:var(--muted);
}

/* winner tick + penalties + live tag */
.b-tick{color:var(--gold);font-size:11px;margin-left:2px;}
.b-pen{font-size:8px;color:var(--muted);margin-left:2px;font-family:'Inter',sans-serif;}
.b-live-tag{color:var(--red);font-size:7px;font-weight:700;letter-spacing:.5px;margin-left:4px;animation:pulse 1.2s infinite;}
/* ── FLOATING ACTION BUTTONS ─────────────── */
.fab-stack{
  position:fixed;right:14px;bottom:70px;
  display:flex;flex-direction:column;gap:8px;z-index:80;
}
.fab{
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;box-shadow:0 4px 12px rgba(0,0,0,.4);
  transition:transform .15s,opacity .15s;
}
.fab:active{transform:scale(.9);}
.fab-hoy{background:var(--gold);color:#000;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;}
.fab-top{background:var(--card);color:var(--muted);border:1px solid var(--border);font-size:18px;}
.fab-top.visible{color:var(--gold);}
</style>
</head>
<body>

<div id="stickyTop">
  <header>
    <div class="header-inner">
      <div class="trophy-wrap">
        <svg viewBox="0 0 54 68" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffe066"/>
              <stop offset="40%" stop-color="#f5c842"/>
              <stop offset="70%" stop-color="#fff0a0"/>
              <stop offset="100%" stop-color="#c8960a"/>
            </linearGradient>
            <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#c8960a"/>
              <stop offset="50%" stop-color="#f5c842"/>
              <stop offset="100%" stop-color="#c8960a"/>
            </linearGradient>
          </defs>
          <rect x="12" y="60" width="30" height="5" rx="2" fill="url(#tg2)"/>
          <rect x="9" y="63" width="36" height="5" rx="2" fill="url(#tg2)"/>
          <rect x="21" y="48" width="12" height="14" rx="3" fill="url(#tg)"/>
          <path d="M8,6 L8,36 Q8,52 27,52 Q46,52 46,36 L46,6 Z" fill="url(#tg)"/>
          <path d="M8,10 Q-2,18 0,30 Q2,38 8,35" fill="none" stroke="url(#tg)" stroke-width="4.5" stroke-linecap="round"/>
          <path d="M46,10 Q56,18 54,30 Q52,38 46,35" fill="none" stroke="url(#tg)" stroke-width="4.5" stroke-linecap="round"/>
          <ellipse cx="27" cy="6" rx="19" ry="4" fill="#e8a800"/>
          <ellipse cx="18" cy="22" rx="4" ry="10" fill="rgba(255,255,255,0.18)" transform="rotate(-15,18,22)"/>
        </svg>
      </div>
      <div class="brand-block">
        <span class="lalo-name">LALO'S</span>
        <span class="lalo-sub">WORLD CUP</span>
        <span class="lalo-year">26</span>
      </div>
    </div>
    <div class="header-badges">
      <span class="badge badge-gold">🕐 Chihuahua UTC-6</span>
      <span class="badge badge-green">⚡ En Vivo</span>
    </div>
  </header>

  <div id="updateBar">
    <div id="updateStatus"><span class="spinner"></span> Cargando...</div>
    <button id="refreshBtn" onclick="fetchScores()" disabled>↻ Actualizar</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('calendar')">Calendario</div>
    <div class="tab" onclick="switchTab('groups')">Grupos</div>
    <div class="tab" onclick="switchTab('bracket')">Eliminatoria</div>
  </div>

  <div class="group-filters" id="groupFilters">
    <button class="gf-btn active" onclick="filterGroup('all',this)">Todos</button>
    <button class="gf-btn" onclick="filterGroup('A',this)">Grupo A</button>
    <button class="gf-btn" onclick="filterGroup('B',this)">Grupo B</button>
    <button class="gf-btn" onclick="filterGroup('C',this)">Grupo C</button>
    <button class="gf-btn" onclick="filterGroup('D',this)">Grupo D</button>
    <button class="gf-btn" onclick="filterGroup('E',this)">Grupo E</button>
    <button class="gf-btn" onclick="filterGroup('F',this)">Grupo F</button>
    <button class="gf-btn" onclick="filterGroup('G',this)">Grupo G</button>
    <button class="gf-btn" onclick="filterGroup('H',this)">Grupo H</button>
    <button class="gf-btn" onclick="filterGroup('I',this)">Grupo I</button>
    <button class="gf-btn" onclick="filterGroup('J',this)">Grupo J</button>
    <button class="gf-btn" onclick="filterGroup('K',this)">Grupo K</button>
    <button class="gf-btn" onclick="filterGroup('L',this)">Grupo L</button>
  </div>
</div>

<div class="content" id="calendarTab"></div>
<div class="content hidden" id="groupsTab">
  <div class="group-info-grid" id="groupsGrid"></div>
</div>
<div class="content hidden" id="bracketTab">
  <div id="bracketTree"></div>
  <div id="bracketRounds"></div>
</div>

<!-- Floating buttons -->
<div class="fab-stack">
  <button class="fab fab-hoy" onclick="goToday()" title="Ir a hoy">HOY</button>
  <button class="fab fab-top" id="fabTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Subir">↑</button>
</div>

<div class="totals">
  <div class="total-item"><div class="total-num">72</div><div class="total-label">Partidos</div></div>
  <div class="total-item"><div class="total-num" id="finishedCount">-</div><div class="total-label">Terminados</div></div>
  <div class="total-item"><div class="total-num" id="liveCount">-</div><div class="total-label">En Vivo</div></div>
  <div class="total-item"><div class="total-num" id="daysLeft">-</div><div class="total-label">Días fase</div></div>
</div>

  {id:"E2",date:"Dom 14 Jun",group:"F",j:"J1",home:"🇳🇱",away:"🇯🇵",hname:"Países Bajos",aname:"Japón",time:"14:00",venue:"Estadio Dallas",hkey:"NED",akey:"JPN"},

// ── API ────────────────────────────────────
async function fetchScores() {
  const btn = document.getElementById('refreshBtn');
  const statusEl = document.getElementById('updateStatus');
  btn.disabled = true;
  statusEl.innerHTML = '<span class="spinner"></span> Actualizando...';
  try {
    const res = await fetch('https://holy-queen-11f5.eduardolozano0.workers.dev/?t=' + Date.now(), {cache:'no-store'});
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.message||`HTTP ${res.status}`); }
    const data = await res.json();
    liveData = {...knownScores};
    const tlaAlias = {'URY':'URU','URU':'URY','SAU':'KSA','KSA':'SAU'};

    // ── Group stage: update liveData ──────────────────────────────
    (data.matches||[]).forEach(am => {
      if (am.stage !== 'GROUP_STAGE') return;
      const hN=am.homeTeam?.name||'', aN=am.awayTeam?.name||'';
      const hT=am.homeTeam?.tla||'', aT=am.awayTeam?.tla||'';
      const hK=[hT,tlaAlias[hT]].filter(Boolean), aK=[aT,tlaAlias[aT]].filter(Boolean);
      let loc=matches.find(m=>(hK.includes(m.hkey)&&aK.includes(m.akey))||(hK.includes(m.akey)&&aK.includes(m.hkey)));
      if (!loc) {
        const hF=hN.toLowerCase().split(' ')[0], aF=aN.toLowerCase().split(' ')[0];
        loc=matches.find(m=>(m.hname.toLowerCase().includes(hF)&&m.aname.toLowerCase().includes(aF))||(m.aname.toLowerCase().includes(hF)&&m.hname.toLowerCase().includes(aF)));
      }
      if (!loc) return;
      const st=am.status, hg=am.score?.fullTime?.home, ag=am.score?.fullTime?.away;
      let score=null, statusKey='NS';
      if (st==='FINISHED'){score=`${hg??0}-${ag??0}`;statusKey='FT';}
      else if (st==='IN_PLAY'||st==='PAUSED'){score=`${hg??0}-${ag??0}`;statusKey='LIVE';}
      liveData[loc.id]={score,status:statusKey};
    });

    // ── Safety net: restore hardcoded scores ─────────────────────
    Object.entries(knownScores).forEach(([id,data])=>{
      if (!liveData[id] || !liveData[id].score || liveData[id].status==='NS') liveData[id]=data;
    });

    // ── Knockout stage: populate knockoutMatches ──────────────────
    const koOrderMap = {LAST_32:0,LAST_16:1,QUARTER_FINALS:2,SEMI_FINALS:3,THIRD_PLACE:4,FINAL:5};
    const tempKO=[];
    (data.matches||[]).forEach(am=>{
      if (am.stage==='GROUP_STAGE'||!(am.stage in koOrderMap)) return;
      const st=am.status, hg=am.score?.fullTime?.home, ag=am.score?.fullTime?.away;
      const hp=am.score?.penalties?.home, ap=am.score?.penalties?.away;
      let score=null, statusKey='NS', pens=null;
      if (st==='FINISHED'){
        score=`${hg??0}-${ag??0}`;statusKey='FT';
        if (hp!=null&&ap!=null) pens=`(${hp}-${ap})`;
      }
      else if (st==='IN_PLAY'||st==='PAUSED'){score=`${hg??0}-${ag??0}`;statusKey='LIVE';}
      const hTLA=am.homeTeam?.tla||'', aTLA=am.awayTeam?.tla||'';
      tempKO.push({
        apiId:am.id, stage:am.stage, utcDate:am.utcDate,
        hname:am.homeTeam?.name||'Por definir',
        hflag:hTLA?(flagByTLA[hTLA]||'🏳'):'❓',
        aname:am.awayTeam?.name||'Por definir',
        aflag:aTLA?(flagByTLA[aTLA]||'🏳'):'❓',
        score, status:statusKey, pens, winner:am.score?.winner
      });
    });
    knockoutMatches=tempKO.sort((a,b)=>koOrderMap[a.stage]-koOrderMap[b.stage]||a.utcDate.localeCompare(b.utcDate));

    lastUpdated=new Date();
    renderCalendar(activeGroup);
    renderGroups();
    renderBracket();
    updateBar(true,null);
  } catch(e) { console.error(e); updateBar(false,e.message); }
  finally { btn.disabled=false; }
}

function updateBar(ok, err) {
  const el=document.getElementById('updateStatus');
  const fin=matches.filter(m=>liveData[m.id]?.status==='FT').length;
  const live=matches.filter(m=>liveData[m.id]?.status==='LIVE').length;
  document.getElementById('finishedCount').textContent=fin;
  document.getElementById('liveCount').textContent=live;
  if (ok) {
    const t=lastUpdated.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    el.innerHTML=`✅ <b>${t}</b> · ${fin} terminados${live?` · <span style="color:var(--red)">●${live} en vivo</span>`:''}`;
  } else { el.innerHTML=`⚠️ ${err||'Error'} — intenta de nuevo`; }
}

// ── RENDER ────────────────────────────────
function renderCalendar(groupFilter) {
  const cal=document.getElementById('calendarTab');
  const list=groupFilter==='all'?matches:matches.filter(m=>m.group===groupFilter);
  const byDay={};
  list.forEach(m=>{if(!byDay[m.date])byDay[m.date]=[];byDay[m.date].push(m);});
  let html='';
  Object.entries(byDay).forEach(([day,ms])=>{
    const isToday = day === todayDayLabels;
    const dayId = isToday ? 'id="today-anchor"' : '';
    html+=`<div class="day-block" ${dayId}>
      <div class="day-label${isToday?' today-label':''}">
        <span class="day-num">${isToday?'HOY':ms.length+' partido'+(ms.length>1?'s':'')}</span>${day}
        ${isToday?`<span style="font-size:10px;color:var(--red);margin-left:auto">● ${ms.length} partidos</span>`:''}
      </div>`;
    ms.forEach(m=>{
      const d=liveData[m.id], st=d?.status||'NS', sc=d?.score||null;
      const isFT=st==='FT', isLive=st==='LIVE';
      const badge=isFT?`<span class="finished">✓ Final</span>`:isLive?`<span class="live-badge">● EN VIVO</span>`:'';
      const mid=(isFT||isLive)&&sc?`<span class="score${isLive?' live':''}">${sc}</span>`:`<span class="vs">VS</span>`;
      html+=`<div class="match-card${isFT?' done':isLive?' live':''}">
        <div class="match-top">
          <span class="match-group">Grupo ${m.group} · ${m.j}</span>
          <div style="display:flex;align-items:center;gap:6px">${badge}<span class="match-time">${m.time}</span></div>
        </div>
        <div class="match-teams">
          <div class="team"><div class="team-flag">${m.home}</div><div class="team-name">${m.hname}</div></div>
          <div class="vs-block">${mid}</div>
          <div class="team"><div class="team-flag">${m.away}</div><div class="team-name">${m.aname}</div></div>
        </div>
        <div class="match-footer"><span>📍</span><span class="match-venue">${m.venue}</span></div>
      </div>`;
    });
    html+='</div>';
  });
  cal.innerHTML=html;
}

// Build a flag+name lookup from the matches array (hname/aname + flag emoji)
const teamFlagByName = {};
const flagByTLA = {};
matches.forEach(m=>{
  teamFlagByName[m.hname]=m.home;
  teamFlagByName[m.aname]=m.away;
  flagByTLA[m.hkey]=m.home;
  flagByTLA[m.akey]=m.away;
});

function computeStandings(group) {
  // Derive team names from matches array (guaranteed consistent)
  const table = {};
  matches.filter(m=>m.group===group).forEach(m=>{
    if (!table[m.hname]) table[m.hname]={name:m.hname,flag:m.home,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};
    if (!table[m.aname]) table[m.aname]={name:m.aname,flag:m.away,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};
  });

  // Walk every match in this group that has a FINISHED result
  matches.filter(m=>m.group===group).forEach(m=>{
    const d=liveData[m.id];
    if (!d || d.status!=='FT' || !d.score) return;
    const [hg,ag]=d.score.split('-').map(Number);
    const h=table[m.hname], a=table[m.aname];
    if (!h||!a) return;
    h.pj++; a.pj++;
    h.gf+=hg; h.gc+=ag;
    a.gf+=ag; a.gc+=hg;
    if (hg>ag){h.g++;h.pts+=3;a.p++;}
    else if (hg<ag){a.g++;a.pts+=3;h.p++;}
    else {h.e++;a.e++;h.pts++;a.pts++;}
  });

  return Object.values(table).sort((x,y)=>
    y.pts-x.pts || (y.gf-y.gc)-(x.gf-x.gc) || y.gf-x.gf || x.name.localeCompare(y.name)
  );
}

let knockoutMatches = [];

function renderGroups() {
  document.getElementById('groupsGrid').innerHTML =
    Object.keys(groupTeams).map(g=>{
      const standings = computeStandings(g);
      const allPlayed = standings.every(t=>t.pj>=3);
      const rows = standings.map((t,i)=>{
        const dg = t.gf-t.gc;
        return `<tr class="${i<2?'qualifying':''}">
          <td class="td-pos">${i+1}</td>
          <td class="td-team"><span class="team-flag-sm">${t.flag}</span>${t.name}</td>
          <td>${t.pj}</td><td>${t.g}</td><td>${t.e}</td><td>${t.p}</td>
          <td>${t.gf}</td><td>${t.gc}</td><td>${dg>0?'+':''}${dg}</td>
          <td class="td-pts">${t.pts}</td>
        </tr>`;
      }).join('');
      return `<div class="group-card">
        <div class="group-card-title">GRUPO ${g}${allPlayed?'<span class="gc-complete">✓ COMPLETO</span>':''}</div>
        <table class="standings-table">
          <thead><tr>
            <th></th><th class="th-team">Equipo</th>
            <th>PJ</th><th>G</th><th>E</th><th>P</th>
            <th>GF</th><th>GC</th><th>DG</th><th>Pts</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('');
}

function utcToChih(utcStr) {
  if (!utcStr) return '--:--';
  const d=new Date(new Date(utcStr).getTime()-6*3600000);
  return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0');
}
function utcToDateLabel(utcStr) {
  if (!utcStr) return '';
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const d=new Date(new Date(utcStr).getTime()-6*3600000);
  return days[d.getUTCDay()]+' '+d.getUTCDate()+' '+months[d.getUTCMonth()];
}

function renderBracket() {
  const treeEl=document.getElementById('bracketTree');
  const roundsEl=document.getElementById('bracketRounds');
  if (!treeEl||!roundsEl) return;
  treeEl.innerHTML='';

  const stages=[
    {key:'LAST_32',   label:'Ronda de 32'},
    {key:'LAST_16',   label:'Ronda de 16'},
    {key:'QUARTER_FINALS',label:'Cuartos'},
    {key:'SEMI_FINALS',   label:'Semis'},
    {key:'FINAL',         label:'🏆 Final'},
  ];
  const thirdM=knockoutMatches.find(m=>m.stage==='THIRD_PLACE');

  if (!knockoutMatches.length) {
    roundsEl.innerHTML=`<div class="b-placeholder">🏆 La fase eliminatoria arranca el<br><b style="color:var(--gold);font-size:14px">Domingo 28 de Junio</b><br><span style="font-size:11px">Regresa aquí para ver el bracket en vivo</span></div>`;
    return;
  }

  // Progress + live counters
  const koPlayed=knockoutMatches.filter(m=>m.status==='FT').length;
  const koLive=knockoutMatches.filter(m=>m.status==='LIVE').length;
  const koTotal=knockoutMatches.filter(m=>!(m.hname==='Por definir'&&m.aname==='Por definir')).length;

  // Champion detection
  const finalM=knockoutMatches.find(m=>m.stage==='FINAL');
  let championHtml='';
  if (finalM&&finalM.status==='FT'){
    const champ = finalM.winner==='HOME_TEAM'?{f:finalM.hflag,n:finalM.hname}
                : finalM.winner==='AWAY_TEAM'?{f:finalM.aflag,n:finalM.aname}:null;
    if (champ) championHtml=`<div class="champion-banner">
      <div class="champ-trophy">🏆</div>
      <div class="champ-label">CAMPEÓN DEL MUNDO</div>
      <div class="champ-team">${champ.f} ${champ.n}</div>
    </div>`;
  }

  const progressHtml=`<div class="ko-progress">
    <span>⚡ ${koPlayed}/${koTotal} definidos</span>
    ${koLive?`<span style="color:var(--red)">● ${koLive} en vivo</span>`:''}
  </div>`;

  function teamRow(flag,name,score,isWin,isTBD,dot,penStr) {
    const cl=isTBD?'tbd':isWin?'winner':'';
    const liveDot=dot?'<span class="b-live-dot"></span>':'';
    const sc=score!=null?`<span class="b-score">${score}${penStr?`<span class="b-pen">${penStr}</span>`:''}</span>`:'';
    const tick=isWin?'<span class="b-tick">▸</span>':'';
    return `<div class="b-team ${cl}"><span class="b-flag">${flag||'🏳'}</span><span class="b-name">${liveDot}${name||'Por definir'}</span>${sc}${tick}</div>`;
  }

  function card(m,isFinal) {
    if (!m) return '';
    const isFT=m.status==='FT',isLive=m.status==='LIVE';
    const pts=isFT&&m.score?m.score.split('-').map(Number):[];
    // Use API winner field (accounts for penalties), fall back to score compare
    let hW=false,aW=false;
    if (isFT){
      if (m.winner==='HOME_TEAM') hW=true;
      else if (m.winner==='AWAY_TEAM') aW=true;
      else if (pts.length){hW=pts[0]>pts[1];aW=pts[1]>pts[0];}
    }
    const hS=pts.length?pts[0]:null,aS=pts.length?pts[1]:null;
    const hTBD=m.hname==='Por definir',aTBD=m.aname==='Por definir';
    // Penalty display: show pens next to each team
    let hPen=null,aPen=null;
    if (m.pens){const pp=m.pens.replace(/[()]/g,'').split('-');hPen=pp[0];aPen=pp[1];}
    const liveTag=isLive?'<span class="b-live-tag">● EN VIVO</span>':'';
    return `<div class="b-match${isFT?' done':isLive?' live':''}${isFinal?' final-match':''}">
      <div class="b-date">${utcToDateLabel(m.utcDate)} ${utcToChih(m.utcDate)}${liveTag}</div>
      ${teamRow(m.hflag,m.hname,hS,hW,hTBD,isLive&&!isFT,hPen)}
      ${teamRow(m.aflag,m.aname,aS,aW,aTBD,false,aPen)}
    </div>`;
  }

  let html=championHtml+progressHtml+'<div class="bracket-wrap"><div class="bracket-row">';
  const activeCols=stages.filter(s=>knockoutMatches.some(m=>m.stage===s.key));

  activeCols.forEach((s,ci)=>{
    const ms=knockoutMatches.filter(m=>m.stage===s.key)
      .sort((a,b)=>a.utcDate.localeCompare(b.utcDate));
    const isFinalCol=s.key==='FINAL';
    html+=`<div class="b-round">
      <div class="b-round-hdr">${s.label}</div>
      ${ms.map(m=>card(m,isFinalCol)).join('')}
      ${isFinalCol&&thirdM?`<div style="font-size:8px;color:var(--muted);text-align:center;padding:6px 0 2px;border-top:1px solid var(--border);margin-top:6px">3ER Y 4TO LUGAR</div>${card(thirdM,false)}`:''}
    </div>`;
    if (ci<activeCols.length-1){
      const pairs=Math.ceil(ms.length/2);
      let conn='';
      for(let i=0;i<pairs;i++) conn+=`<div class="b-conn-pair"></div>`;
      html+=`<div class="b-conn">${conn}</div>`;
    }
  });
  html+='</div></div>';
  roundsEl.innerHTML=html;
}

function filterGroup(group,btn) {
  activeGroup=group;
  document.querySelectorAll('.gf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCalendar(group);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.add('hidden'));
  document.getElementById('groupFilters').style.display='none';
  const fabs=document.querySelector('.fab-stack');
  if (tab==='calendar') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('calendarTab').classList.remove('hidden');
    document.getElementById('groupFilters').style.display='flex';
    if(fabs) fabs.style.display='flex';
  } else if (tab==='groups') {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('groupsTab').classList.remove('hidden');
    if(fabs) fabs.style.display='none';
  } else {
    document.querySelectorAll('.tab')[2].classList.add('active');
    document.getElementById('bracketTab').classList.remove('hidden');
    if(fabs) fabs.style.display='none';
  }
}

function goToday() {
  switchTab('calendar');
  activeGroup='all';
  document.querySelectorAll('.gf-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.gf-btn').classList.add('active');
  renderCalendar('all');
  setTimeout(()=>{
    const el = document.getElementById('today-anchor');
    if (!el) return;
    const stickyH = document.getElementById('stickyTop').offsetHeight;
    const y = el.getBoundingClientRect().top + window.scrollY - stickyH - 6;
    window.scrollTo({top: Math.max(0, y), behavior:'smooth'});
  }, 150);
}
