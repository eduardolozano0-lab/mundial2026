<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 · Fase de Grupos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0a0e1a; --card:#111827; --border:#1f2d45; --gold:#f5c842;
    --green:#22c55e; --red:#ef4444; --text:#e2e8f0; --muted:#64748b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

  header{background:linear-gradient(135deg,#0a0e1a,#0f1e3a);border-bottom:2px solid var(--gold);padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100;}
  .header-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--gold);line-height:1;}
  .header-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
  .header-badges{display:flex;justify-content:center;gap:6px;margin-top:6px;flex-wrap:wrap;}
  .badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:20px;text-transform:uppercase;}
  .badge-gold{background:var(--gold);color:#000;}
  .badge-green{background:rgba(34,197,94,.2);color:var(--green);border:1px solid var(--green);}

  #updateBar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  #updateStatus{font-size:11px;color:var(--muted);flex:1;}
  #updateStatus span{color:var(--text);}
  #refreshBtn{background:var(--gold);color:#000;border:none;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;}
  #refreshBtn:disabled{opacity:.5;cursor:not-allowed;}

  .spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--card);scrollbar-width:none;padding:0 12px;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:10px 14px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);}

  .group-filters{display:flex;overflow-x:auto;gap:6px;padding:10px 14px;scrollbar-width:none;background:var(--bg);}
  .group-filters::-webkit-scrollbar{display:none;}
  .gf-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;}
  .gf-btn.active{background:var(--gold);border-color:var(--gold);color:#000;}

  .content{padding:0 12px 80px;}
  .day-block{margin-bottom:20px;}
  .day-label{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .day-num{background:var(--gold);color:#000;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:'Inter',sans-serif;}

  .match-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 12px;margin-bottom:7px;transition:border-color .2s;}
  .match-card.done{border-color:rgba(34,197,94,.3);}
  .match-card.live{border-color:rgba(239,68,68,.5);}
  .match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .match-group{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
  .match-time{font-size:13px;font-weight:700;color:var(--gold);}
  .match-teams{display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .team{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
  .team-flag{font-size:24px;line-height:1;}
  .team-name{font-size:11px;font-weight:600;text-align:center;color:var(--text);line-height:1.2;}
  .vs-block{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:40px;}
  .vs{font-size:12px;font-weight:700;color:var(--muted);}
  .score{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);letter-spacing:2px;}
  .score.live{color:var(--red);}
  .match-footer{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border);}
  .match-venue{font-size:10px;color:var(--muted);flex:1;}
  .finished{font-size:9px;font-weight:700;color:var(--green);letter-spacing:1px;}
  .live-badge{font-size:9px;font-weight:700;color:var(--red);background:rgba(239,68,68,.15);padding:2px 6px;border-radius:10px;letter-spacing:1px;animation:pulse 1.5s infinite;}

  .hidden{display:none;}
  .totals{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-around;z-index:50;}
  .total-item{text-align:center;}
  .total-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);}
  .total-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

  .group-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
  .group-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;}
  .group-card-title{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px;}
  .group-team{font-size:11px;padding:3px 0;color:var(--text);display:flex;align-items:center;gap:5px;}
</style>
</head>
